spring.application.name=AlliedEdge

# =========================================================
# Server (Render/Cloudflare)
# =========================================================
# Render sets $PORT for web services. If we don't bind to it, the service may be
# considered down and Cloudflare can return 521.
server.port=${PORT:8080}

# =========================================================
# Database (env-first, localhost fallback for local dev)
# =========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# Hibernate & JPA
# =========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.sql.init.mode=never

# =========================================================
# Flyway
# =========================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
flyway.repair.enabled=${FLYWAY_REPAIR_ENABLED:false}


spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=30000


# =========================================================
# H2 (disabled)
# =========================================================
spring.h2.console.enabled=false

# =========================================================
# Multipart / Upload limits
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=130MB

# =========================================================
# Google OAuth2 (env-based)
# =========================================================
spring.security.oauth2.client.registration.google.client-id=${VITE_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${VITE_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# =========================================================
# Error handling
# =========================================================
server.error.include-message=never

# =========================================================
# Cloudinary (REQUIRED in Docker/Prod)
# =========================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =========================================================
# JWT
# =========================================================
app.jwt.secret=${APP_JWT_SECRET:change-this-in-prod}
app.jwt.expirationSeconds=${APP_JWT_EXPIRATION:86400}

# =========================================================
# CORS
# =========================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# =========================================================
# Frontend redirect (OAuth2 success)
# =========================================================
app.frontend.redirect-url=${APP_FRONTEND_REDIRECT_URL}

# =========================================================
# Cookies / proxy (needed for cross-site session auth in production)
# =========================================================
# When frontend (Vercel) and backend (Render) are on different sites, browsers will
# drop the session cookie unless it is marked SameSite=None; Secure.
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
# Ensure Spring correctly detects https behind Render/Cloudflare proxies.
server.forward-headers-strategy=framework

# =========================================================
# Timezone (keep timestamps consistent across environments)
# =========================================================
# Entities currently persist LocalDateTime, so we must pin the JVM/Jackson/Hibernate timezone
# to avoid seeing times shifted after deployment.
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
