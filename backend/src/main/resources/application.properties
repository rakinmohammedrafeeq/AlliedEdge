spring.application.name=AlliedEdge

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ae_blog_prod_db
spring.datasource.username=allied_edge_user
spring.datasource.password=allied_edge_2005
spring.datasource.driver-class-name=org.postgresql.Driver



# Hibernate & JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Removed spring.jpa.defer-datasource-initialization=true to avoid circular dependency with Flyway

spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Controls temporary Flyway.repair() runner. Keep FALSE in source; enable only via runtime override.
flyway.repair.enabled=false

spring.h2.console.enabled=false

# Multipart limits (still needed for uploads, regardless of storage backend)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB

# --- Google OAuth2 (placeholders, set via environment variables) ---
# Obtain credentials from Google Cloud Console and set as env vars before running
# Fallback to VITE_GOOGLE_CLIENT_ID to avoid local dev env mismatches.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:${VITE_GOOGLE_CLIENT_ID:}}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:${VITE_GOOGLE_CLIENT_SECRET:}}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Always show custom login page
server.error.include-message=never

# --- Cloudinary  ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# JWT configuration for React login
app.jwt.secret=${APP_JWT_SECRET:change-this-in-prod}
app.jwt.expirationSeconds=${APP_JWT_EXPIRATION:86400}

# CORS (React dev server)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# After OAuth2 login, redirect user back to the SPA
app.frontend.redirect-url=${APP_FRONTEND_REDIRECT_URL:http://localhost:5173/}
