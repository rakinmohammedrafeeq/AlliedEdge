<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <!-- We can reuse the same styling from our 404 page -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
            color: #dc3545; /* Red for error */
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #6c757d;
        }
        p {
            margin-bottom: 20px;
        }
        .error-details {
            font-family: "Courier New", Courier, monospace;
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            color: #495057;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Error</h1>
    <h2>Something Went Wrong</h2>


    <div class="error-details" th:if="${errorMessage}" th:text="${errorMessage}">
        An unexpected error occurred. Please try again later.
    </div>
    <div class="error-details" th:if="${path}" >Path: <span th:text="${path}"></span></div>
    <div class="error-details" th:if="${status}" >Status: <span th:text="${status}"></span></div>

    <p>We are sorry for the inconvenience. Our technical team has been notified.</p>
    <p><a th:href="@{/}">Return to Homepage</a></p>
</div>
</body>
</html>
