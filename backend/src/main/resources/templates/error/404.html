<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 5rem;
            font-weight: 300;
            margin: 0;
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #6c757d;
        }
        p {
            margin-bottom: 20px;
        }
        .error-details {
            font-family: "Courier New", Courier, monospace;
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            color: #495057;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found.</h2>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>


    <div class="error-details" th:if="${errorMessage}" th:text="${errorMessage}">
        Specific error details will go here.
    </div>

    <p><a th:href="@{/}">Return to Homepage</a></p>
</div>
</body>
</html>
